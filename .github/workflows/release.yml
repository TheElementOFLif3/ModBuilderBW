name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_CERTIFICATE_P12_BASE64}" ]; then
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials modbuilderbw-notary --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID"

      - name: Build macOS app and DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_PROFILE: modbuilderbw-notary
        run: |
          if [ -z "${MACOS_SIGN_IDENTITY}" ]; then
            export MACOS_SIGN_IDENTITY=-
            export MACOS_NOTARY_PROFILE=
          fi
          ./native/macos/build_dmg.sh "$RUNNER_TEMP/macos-release" "$GITHUB_WORKSPACE/branding/ModBuilderBW.png"

      - uses: actions/upload-artifact@v4
        with:
          name: ModBuilderBW-macOS
          path: |
            ${{ runner.temp }}/macos-release/Mod Builder BW.app
            ${{ runner.temp }}/macos-release/ModBuilderBW-Swift-macOS.dmg

  build-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Windows installer
        shell: pwsh
        run: |
          python native/windows/build_windows_installer.py --output "$env:RUNNER_TEMP/windows-release" --icon "$env:GITHUB_WORKSPACE/branding/ModBuilderBW.ico"

      - name: Import Windows signing certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64)) { exit 0 }
          $pfxPath = Join-Path $env:RUNNER_TEMP 'modbuilderbw-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          "WINDOWS_CERTIFICATE_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign Windows binaries
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64) -and [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) { exit 0 }
          ./scripts/release/sign_windows.ps1 -Files @(
            "$env:RUNNER_TEMP/windows-release/ModBuilderBW-Windows-App/ModBuilderBW.Windows.exe",
            "$env:RUNNER_TEMP/windows-release/ModBuilderBW-Windows-Installer.msi"
          )

      - uses: actions/upload-artifact@v4
        with:
          name: ModBuilderBW-Windows
          path: |
            ${{ runner.temp }}/windows-release/ModBuilderBW-Windows-App
            ${{ runner.temp }}/windows-release/ModBuilderBW-Windows-Installer.msi
